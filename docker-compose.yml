services:
  music-monster:
    # NOTE (Ray): build & push raymanalang/music-monster, then force re-pull in Portainer.
    # The old raymanalang/ytm-downloader image name is retired.
    image: raymanalang/music-monster:latest
    container_name: music-monster
    restart: unless-stopped
    ports:
      - "8503:8080"
    volumes:
      - /mnt/data/supervisor/share:/share
      # Source FLAC library — mounted read-write so Clean Tags can edit tags in
      # place (Audit + Convert only read). Add :ro to make it read-only.
      - /mnt/data/supervisor/share/Music:/music
      # iPod AAC mirror output — read-write.
      - /mnt/data/supervisor/share/iPod:/ipod
      # Cookies for age-restricted videos — no :ro (yt-dlp writes back).
      - /mnt/data/supervisor/share/cookies.txt:/cookies.txt
      - ytm_data:/data
    environment:
      DOWNLOADS_DIR: /share
      DB_PATH: /data/downloads.db
      YTM_AUTH_PATH: /data/ytm_auth.json
      COOKIES_FILE: /cookies.txt
      MAX_CONCURRENT_DOWNLOADS: "2"
      # Finished downloads auto-move to MUSIC_DIR + copy to IPOD_DIR + index (default on).
      # AUTO_PROMOTE: "0"   # uncomment to keep downloads in /share only
      # ── iPod-Prep / Music Monster ──
      MUSIC_DIR: /music
      IPOD_DIR: /ipod
      MAX_CONCURRENT_CONVERSIONS: "2"
      AAC_BITRATE: 256k
      # AI playlist engine — optional. Set the key to enable; NEVER commit it.
      # ANTHROPIC_API_KEY: sk-ant-...
      ANTHROPIC_MODEL: claude-haiku-4-5

volumes:
  ytm_data:
