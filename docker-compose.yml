services:
  ytm-downloader:
    image: raymanalang/ytm-downloader:latest
    container_name: ytm-downloader
    restart: unless-stopped
    ports:
      - "8503:8080"
    volumes:
      - /mnt/data/supervisor/share:/share
      - ytm_data:/data
    environment:
      DOWNLOADS_DIR: /share
      DB_PATH: /data/downloads.db
      MAX_CONCURRENT_DOWNLOADS: "2"

volumes:
  ytm_data:
