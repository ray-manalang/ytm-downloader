services:
  music-monster:
    # NOTE (Ray): build & push raymanalang/music-monster, then force re-pull in Portainer.
    # The old raymanalang/ytm-downloader image name is retired.
    image: raymanalang/music-monster:latest
    container_name: music-monster
    restart: unless-stopped
    ports:
      - "8503:8080"
    volumes:
      - /mnt/data/supervisor/share:/share
      - ytm_data:/data
      # Source music library. Convert + Audit only read it, so :ro is safe for
      # those; the Clean Tags tool writes tags in place, so drop :ro if you use it.
      # - /mnt/data/supervisor/share/Music:/music:ro
      # iPod AAC mirror output — read-write (e.g. NAS mount):
      # - /Volumes/Terradrive/ipodMusic:/ipod
    environment:
      DOWNLOADS_DIR: /share
      DB_PATH: /data/downloads.db
      MAX_CONCURRENT_DOWNLOADS: "2"
      # ── iPod-Prep / Music Monster ──
      # MUSIC_DIR: /music
      # IPOD_DIR: /ipod
      MAX_CONCURRENT_CONVERSIONS: "2"
      AAC_BITRATE: 256k

volumes:
  ytm_data:
